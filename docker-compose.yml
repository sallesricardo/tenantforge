services:
  postgres:
    image: postgres:18-bookworm
    restart: always
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_PASSWORD: ${PG_PASSWORD:-password}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-postgres}
    ports:
      - ${PG_PORT:-5432}:5432
    volumes:
      - postgres:/var/lib/postgresql


volumes:
  postgres:

